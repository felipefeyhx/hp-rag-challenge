<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HP RAG Chatbot</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="app">
    <!-- Sidebar: session list -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <span class="logo">HP</span>
        <span>Sessions</span>
      </div>
      <button id="new-chat" class="btn btn-primary">+ New chat</button>
      <ul id="session-list" class="session-list"></ul>
    </aside>

    <!-- Main chat area -->
    <main class="chat">
      <header class="chat-header">
        <h1>HP RAG Chatbot</h1>
        <span id="status" class="status">connecting…</span>
      </header>

      <div id="messages" class="messages">
        <div class="empty-state" id="empty-state">
          Ask a question about the HP documents to get started.
        </div>
      </div>

      <form id="chat-form" class="chat-form">
        <input
          id="chat-input"
          class="chat-input"
          type="text"
          placeholder="Ask a question about the HP documents…"
          autocomplete="off"
        />
        <button id="send-btn" class="btn btn-primary" type="submit">Send</button>
      </form>
    </main>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
